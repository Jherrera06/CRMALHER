name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias de Functions
        run: |
          cd functions
          npm install
        continue-on-error: false

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Desplegar a Firebase (Hosting + Functions)
        run: firebase deploy --only hosting,functions --project alhercrm --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
